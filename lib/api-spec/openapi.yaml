openapi: 3.0.0
info:
  title: TrabalhoJusto API
  description: API para a plataforma de inclusão profissional WorkUp (ODS 8)
  version: 1.0.0
servers:
  - url: http://localhost:3000
paths:
  /curriculos:
    get:
      summary: Buscar todos os currículos
      responses:
        '200':
          description: Lista de currículos
    post:
      summary: Criar um novo currículo
      responses:
        '201':
          description: Currículo criado
  /curriculos/{id}:
    get:
      summary: Buscar um currículo específico
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
    put:
      summary: Atualizar um currículo
    delete:
      summary: Excluir um currículo
  /companies:
    get:
      summary: Buscar todas as empresas
    post:
      summary: Criar nova empresa
